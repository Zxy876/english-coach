# Google Cloud Build configuration for maieutic
steps:
  # Step 1: Build Docker image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - '-t'
      - 'gcr.io/$PROJECT_ID/maieutic:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/maieutic:latest'
      - .
    id: build-image

  # Step 2: Push image to Container Registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - 'gcr.io/$PROJECT_ID/maieutic:$SHORT_SHA'
    id: push-image

  # Step 3: Deploy to Cloud Run
  - name: gcr.io/cloud-builders/gke-deploy
    args:
      - run
      - '-f=.'
      - '-i=gcr.io/$PROJECT_ID/maieutic:$SHORT_SHA'
      - '-l=gcr.io/cloud-builders/gke-deploy'
      - '-o=/workspace/output'
      - '-n=default'
    id: deploy-image

# Images to be pushed to Container Registry
images:
  - 'gcr.io/$PROJECT_ID/maieutic:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/maieutic:latest'

# Build timeout (in seconds)
timeout: 1800s

# Machine type
machineType: 'N1_HIGHCPU_8'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'N1_HIGHCPU_8'
