# Google Cloud Build configuration for english-coach
substitutions:
  _REGION: asia-east1
  _SERVICE: english-coach

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/${_SERVICE}:$SHORT_SHA
      - -t
      - gcr.io/$PROJECT_ID/${_SERVICE}:latest
      - .
    id: build-image

  - name: gcr.io/cloud-builders/docker
    args: [push, gcr.io/$PROJECT_ID/${_SERVICE}:$SHORT_SHA]
    id: push-image

  - name: gcr.io/cloud-builders/docker
    args: [push, gcr.io/$PROJECT_ID/${_SERVICE}:latest]
    id: push-latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=gcr.io/$PROJECT_ID/${_SERVICE}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --memory=1Gi
      - --cpu=1
      - --max-instances=4
    id: deploy

images:
  - gcr.io/$PROJECT_ID/${_SERVICE}:$SHORT_SHA
  - gcr.io/$PROJECT_ID/${_SERVICE}:latest

timeout: 1800s
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: N1_HIGHCPU_8